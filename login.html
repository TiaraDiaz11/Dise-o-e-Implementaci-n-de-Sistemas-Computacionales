<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Unlock Fragancias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>UNLOCK</h1>
            <span class="subtitulo">FRAGANCIAS</span>
            <h2>Iniciar Sesión</h2>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Ingresá tu correo" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresá tu contraseña" required>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>
            </form>

            <p class="registro">¿No tenés cuenta?
                <a href="#" id="mostrarRegistro">Crear cuenta</a>
            </p>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
